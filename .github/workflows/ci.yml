name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: djmeyer_pms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/djmeyer_pms_test
          # The unit suite builds its schema with create_all against this separate DB, so
          # it runs on Postgres rather than SQLite. Kept distinct from the migration DB
          # above so the two never collide.
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost/djmeyer_pms_unit
          PGPASSWORD: postgres
          SECRET_KEY: ci-test-key
          FLASK_APP: run.py
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE djmeyer_pms_unit;"
          python -m flask db upgrade
          pytest -v
