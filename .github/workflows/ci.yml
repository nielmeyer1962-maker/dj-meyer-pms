name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: djmeyer_pms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Migrate (smoke — proves migrations apply on Postgres)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/djmeyer_pms_test
          SECRET_KEY: ci-test-key
          FLASK_APP: run.py
        run: python -m flask db upgrade

      - name: Create suite database
        # The test suite owns its schema via create_all/drop_all per test, so it needs a
        # clean database separate from the migration-smoke one above (whose seeded rows
        # would otherwise leak into the first test).
        run: >-
          python -c "import psycopg2;
          c = psycopg2.connect(host='localhost', user='postgres', password='postgres', dbname='postgres');
          c.autocommit = True;
          c.cursor().execute('CREATE DATABASE djmeyer_pms_suite')"

      - name: Tests (full suite on Postgres)
        # TEST_DATABASE_URL makes conftest run on real Postgres; without it the suite uses
        # SQLite in-memory (the unchanged local default).
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost/djmeyer_pms_suite
        run: pytest -v
